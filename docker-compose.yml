services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flarestatus}
      POSTGRES_USER: ${POSTGRES_USER:-flarestatus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flarestatus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-flarestatus} -d ${POSTGRES_DB:-flarestatus}
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-flarestatus}:${POSTGRES_PASSWORD:-flarestatus}@postgres:5432/${POSTGRES_DB:-flarestatus}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-admin-token}
      PROBE_API_TOKEN: ${PROBE_API_TOKEN:-change-me-probe-token}
    ports:
      - ${APP_PORT:-3000}:3000

volumes:
  postgres_data:
